{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center text-center mt-5">
    <div class="col-md-6">
        <h1 class="display-1 text-danger fw-bold">{{ error_code }}</h1>
        <h3 class="text-uppercase mb-4">{{ error_message }}</h3>
        
        <p class="lead text-muted">
            Sorry, we couldn't find any student with Roll Number <strong>{{ rollno }}</strong> in our database.
        </p>
        <p>Please check the roll number and try again.</p>
        
        <a href="/students" class="btn btn-primary mt-3">Back to All Students</a>
        <a href="/" class="btn btn-outline-secondary mt-3">Go to Home</a>
    </div>
</div>
{% endblock %}
