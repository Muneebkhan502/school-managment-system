{% extends "layout.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary">Student Record</h2>
    <a href="/#" class="btn btn-success"> Update Student Record</a>
</div>

<!-- Bootstrap Table -->
<div class="table-responsive shadow-sm rounded">
    <table class="table table-hover table-bordered align-middle bg-white mb-0">
        <thead class="table-dark">
            <tr>
                <th>Roll No</th>
                <th>Full Name</th>
                <th>Department</th>
                <th>Marks</th>
                <th>Email ID</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>{{ student.rollno }}</strong></td>
                <td>{{ student.full_name }}</td>
                <td><span class="badge bg-info text-dark">{{ student.dept }}</span></td>
                <td>{{ student.marks }}</td>
                <td>{{ student.Email }}</td>
                <td>
                    <!-- CRUD operations ke dummy buttons -->
                    <button class="btn btn-sm btn-outline-primary">Edit</button>
                    <button class="btn btn-sm btn-outline-danger">Delete</button>
                </td>
            </tr>
            
        </tbody>
    </table>
</div>
{% endblock %}
